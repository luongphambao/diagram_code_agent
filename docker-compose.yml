name: diagram-agent

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diagram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diagram}
      POSTGRES_DB: ${POSTGRES_DB:-diagram}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diagram} -d ${POSTGRES_DB:-diagram}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Expose only if you want to inspect the DB from the host:
    # ports: ["5432:5432"]

  # qdrant:
  #   image: qdrant/qdrant:v1.9.7
  #   ports:
  #     - "6333:6333"
  #     - "6334:6334"
  #   volumes:
  #     - qdrant_storage:/qdrant/storage
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10

  # One-shot: makes the host-bind-mounted ./artifacts dir writable by the
  # backend's non-root appuser before backend starts, then exits.
  #
  # Why this exists: `docker inspect`-verified on Docker Desktop for Linux —
  # a bind-mounted host directory is presented INSIDE every container as
  # owned by 0:0 (root) regardless of its real host ownership (only the
  # permission BITS pass through correctly, not the owner/group). So
  # `user: 1000:1000` below can never satisfy an owner- or group-based check
  # against a bind mount on this Docker setup, no matter what UID/GID the
  # host directory actually has or what you set `${UID}`/`${GID}` to — the
  # only permission class that still applies is "other". This init step
  # chmods the mount to rwx for "other" (root:root owner/group, from the
  # backend container's point of view, keep their normal bits; "other" gets
  # write+execute so appuser — neither the owner nor the group under this
  # remapping — can still create/write per-thread subdirectories).
  # Idempotent and harmless on setups where bind mounts DO preserve host
  # ownership (native Docker Engine, no VM) — chmod is a no-op there since
  # appuser would already own or match-group the directory.
  artifacts-init:
    image: busybox:1.36
    command: ["sh", "-c", "chmod 777 /app/artifacts"]
    volumes:
      - ./artifacts:/app/artifacts

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Bypass Docker's embedded DNS proxy (127.0.0.11) for external lookups.
    # Root-caused live: resolving a Modal sandbox's per-task hostname
    # (task-<id>.w.modal.host — DNSSEC-signed zone, short 60s TTL, minted
    # fresh per sandbox) via the container's default resolver chain took
    # 300+ seconds before finally failing, long enough that the sandbox's
    # own timeout expired first — while `dig`/`getaddrinfo` against 8.8.8.8
    # directly resolved the SAME hostname in under half a second. Every other
    # domain tested (pypi.org, github, api.modal.com, ...) was unaffected —
    # this is specific to Docker's embedded DNS proxy's handling of this
    # zone, not a real network/DNS outage. Modal render calls will hang for
    # minutes and then fail without this.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # Runs as a fixed non-root UID/GID (improvement plan §1.6 — see
    # backend/Dockerfile). Defaults to 1000:1000; see artifacts-init above
    # for why ./artifacts being host-owned by a matching UID is NOT
    # sufficient by itself on Docker Desktop for Linux.
    user: "${UID:-1000}:${GID:-1000}"
    # Secrets (OPENAI_API_KEY, LANGSMITH_*) come from backend/.env at RUNTIME —
    # they are never baked into the image.
    env_file:
      - backend/.env
    environment:
      # Postgres-backed sessions (checkpointer + store).
      DATABASE_URL: postgresql://${POSTGRES_USER:-diagram}:${POSTGRES_PASSWORD:-diagram}@postgres:5432/${POSTGRES_DB:-diagram}
      DIAGRAM_AGENT_PORT: "8001"
      # Lock CORS to the frontend origin(s) in production.
      ALLOWED_ORIGINS: "http://localhost:5173"
      # Qdrant for RAG (internal solution similarity search)
      # QDRANT_URL: "http://qdrant:6333"
      # Per-session workspaces are mounted here (host-visible under ./artifacts/<threadId>/)
      # instead of living inside the opaque agentspace volume — see backends.py.
      ARTIFACTS_DIR: /app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      artifacts-init:
        condition: service_completed_successfully
      # qdrant:
      #   condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      # Persist scratch workspace + /memories/AGENTS.md across restarts.
      - agentspace:/app/backend/agent_space
      # Host-visible per-session artifact folders (./artifacts/<threadId>/...).
      - ./artifacts:/app/artifacts

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # The URL the BROWSER uses to reach the backend (baked at build time).
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8001}
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  agentspace:
  qdrant_storage:
