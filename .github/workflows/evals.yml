name: evals

# Regression gate (docx §4.5): the deterministic eval suites + unit tests run on
# every push/PR. No API key needed — the intake/architecture/wbs suites and the
# pytest suite score the adapter/validator/WBS math against committed baselines.
# The diagram suite (LLM/vision) is intentionally excluded; run it locally.

on:
  push:
    paths:
      - "backend/**"
  pull_request:
    paths:
      - "backend/**"

jobs:
  gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync deps
        # improvement plan §1.3: `|| uv sync` silently re-resolved a stale/out-of-sync
        # lockfile instead of failing CI — the exact gap that let pytest/ruff/pyright
        # go undeclared in uv.lock for a while (see pyproject.toml's dev tooling note).
        # A stale lockfile must fail the build, not quietly drift.
        run: uv sync --frozen
      - name: Unit tests
        run: uv run python -m pytest tests/ -q
      - name: Eval regression gate
        run: uv run python -m evals.run_all --gate
